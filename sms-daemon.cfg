# sms-daemon configuration example.
# If sms_dir or ussd_dir is omitted, the corresponding XML output is disabled.
# Other omitted keys use compiled defaults.
device=/dev/ttyUSB2
job_dir=/tmp/sms-daemon/outsms
sms_dir=/tmp/sms-daemon/ReceivedSMS
ussd_dir=/tmp/sms-daemon/ReceivedSMS
log_file=/tmp/sms-daemon/Log
# sms_hook can be repeated. Each program receives:
# text, sender, sent time, receive time, SMS center.
# sms_hook=/usr/local/bin/sms-hook
debug=true
